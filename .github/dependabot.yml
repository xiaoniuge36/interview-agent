version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 10
    rebase-strategy: auto
    commit-message:
      prefix: chore(deps)
    groups:
      production-minor-and-patch:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-minor-and-patch:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: uv
    directory: /apps/agent-runtime
    schedule:
      interval: weekly
      day: monday
      time: '03:20'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore(deps-python)
    groups:
      python-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '03:40'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore(deps-actions)

  - package-ecosystem: docker
    directories:
      - /apps/api
      - /apps/web
      - /apps/admin
      - /apps/agent-runtime
    schedule:
      interval: weekly
      day: monday
      time: '04:00'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore(deps-docker)

  - package-ecosystem: docker-compose
    directory: /infra/docker
    schedule:
      interval: weekly
      day: monday
      time: '04:20'
      timezone: Asia/Shanghai
    open-pull-requests-limit: 5
    rebase-strategy: auto
    commit-message:
      prefix: chore(deps-compose)
