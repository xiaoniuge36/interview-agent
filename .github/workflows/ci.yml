name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CI: 'true'
  NODE_VERSION: '22'
  PNPM_VERSION: '10.33.0'
  PYTHON_VERSION: '3.12'
  UV_VERSION: '0.11.6'

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:0.8.1-pg16
        env:
          POSTGRES_DB: interview_agent
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d interview_agent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 8
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/interview_agent?schema=public
      REDIS_URL: redis://127.0.0.1:6379
      REDIS_REQUIRED: 'true'
      API_HOST: 127.0.0.1
      API_PORT: '3001'
      API_BODY_LIMIT: 1mb
      API_CORS_ORIGINS: http://localhost:3000,http://localhost:3002
      API_SWAGGER_ENABLED: 'false'
      AUTH_MODE: development
      JWT_SECRET: ci-only-secret-with-at-least-32-characters
      JWT_ISSUER: interview-agent-ci
      JWT_AUDIENCE: interview-agent-web
      AGENT_RUNTIME_URL: http://127.0.0.1:8000
      AGENT_RUNTIME_FALLBACK_ENABLED: 'true'
      INTERNAL_AGENT_TOKEN: ci-internal-agent-token-change-me
      RUN_DATABASE_INTEGRATION: 'true'
      NEXT_PUBLIC_API_BASE_URL: http://localhost:3001/api
      NEXT_PUBLIC_APP_NAME: Interview Agent
      NEXT_PUBLIC_AUTH_MODE: development
      NEXT_PUBLIC_OIDC_AUTHORITY: https://identity.example.com/
      NEXT_PUBLIC_OIDC_CLIENT_ID: interview-agent-web
      NEXT_PUBLIC_OIDC_REDIRECT_URI: http://localhost:3000/auth/callback
      NEXT_PUBLIC_OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3000
      NEXT_PUBLIC_ADMIN_OIDC_CLIENT_ID: interview-agent-admin
      NEXT_PUBLIC_ADMIN_OIDC_REDIRECT_URI: http://localhost:3002/auth/callback
      NEXT_PUBLIC_ADMIN_OIDC_POST_LOGOUT_REDIRECT_URI: http://localhost:3002
      NEXT_PUBLIC_OIDC_SCOPE: openid profile email
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install uv and Python
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: ${{ env.UV_VERSION }}
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
          cache-dependency-glob: apps/agent-runtime/uv.lock

      - name: Install Node.js dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: uv sync --project apps/agent-runtime --frozen --extra dev

      - name: Check generated contracts
        run: pnpm contracts:check

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm db:migrate:deploy

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Audit Node and Python dependencies
        run: pnpm security:audit

  compose:
    name: Validate Compose
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate Compose configuration
        run: docker compose --env-file .env.example -f infra/docker/docker-compose.yml config --quiet

  docker-build:
    name: Build ${{ matrix.name }} image
    needs:
      - quality
      - compose
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            dockerfile: apps/product-api/Dockerfile
            target: runtime
          - name: migration
            dockerfile: apps/product-api/Dockerfile
            target: migration
          - name: web
            dockerfile: apps/user-portal/Dockerfile
            target: runtime
          - name: admin
            dockerfile: apps/admin-console/Dockerfile
            target: runtime
          - name: agent-runtime
            dockerfile: apps/agent-runtime/Dockerfile
            target: runtime
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          tags: interview-agent/${{ matrix.name }}:ci
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          show-openssf-scorecard: true

  sbom:
    name: Generate SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: spdx-json
          output-file: sbom.spdx.json
          artifact-name: interview-agent-sbom.spdx.json
          upload-artifact: true

  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - python
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: ${{ matrix.language }}
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: /language:${{ matrix.language }}
